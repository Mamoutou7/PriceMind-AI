name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Ruff lint
        run: ruff check .

      - name: Run Ruff format check
        run: ruff format --check .

      - name: Run MyPy
        run: mypy apps scripts

      - name: Run Bandit
        run: bandit -c pyproject.toml -r apps scripts

      - name: Run tests
        run: pytest